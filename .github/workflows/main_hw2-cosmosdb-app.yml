name: Build and deploy Python app to Azure Web App - hw2-cosmosdb-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: .

  upload-static:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C7EEE2DAFFDE417EBF9B1322AAA896AD }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_7A100639CA674001BD169BA7DF8EAD62 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_189AE81D23A94BD4B6C3EDF93ED51CAB }}

      - name: Upload CSS to Blob Storage
        run: |
          az storage blob upload \
            --account-name ${{ secrets.STORAGE_ACCOUNT_NAME }} \
            --container-name static \
            --name style.css \
            --file static/style.css \
            --content-type "text/css" \
            --overwrite \
            --auth-mode login

  deploy:
    runs-on: ubuntu-latest
    needs: [build, upload-static]
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C7EEE2DAFFDE417EBF9B1322AAA896AD }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_7A100639CA674001BD169BA7DF8EAD62 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_189AE81D23A94BD4B6C3EDF93ED51CAB }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'hw2-cosmosdb-app'
          slot-name: 'Production'
