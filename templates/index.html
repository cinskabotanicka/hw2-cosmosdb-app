<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App — Azure Cosmos DB</title>
    <link rel="stylesheet" href="{{ static_base_url }}/style.css">
</head>
<body>
<div class="container">
    <h1>📝 Todo List</h1>
    <p class="subtitle">Powered by Azure Cosmos DB (Serverless)</p>

    <form class="add-form" action="/add" method="post">
        <input type="text" name="title" placeholder="Add a new task..." required autofocus>
        <button type="submit">Add</button>
    </form>

    <div class="task-list">
        {% for task in tasks %}
        <div class="task-item {% if task.completed %}done{% endif %}">
            <span class="title">{{ task.title }}</span>
            <a class="btn-toggle" href="/toggle/{{ task.id }}">
                {% if task.completed %}Undo{% else %}Done{% endif %}
            </a>
            <a class="btn-delete" href="/delete/{{ task.id }}">Delete</a>
        </div>
        {% else %}
        <p class="empty">No tasks yet. Add one above!</p>
        {% endfor %}
    </div>
</div>
</body>
</html>
